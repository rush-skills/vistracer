name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    name: Lint, typecheck & test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: ["22", "25.x"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm run test

  build:
    name: Build (${{ matrix.name }})
    needs: ci
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            script: package:mac
            pattern: "release/**/*.dmg"

          - name: Windows
            os: windows-latest
            script: package:win
            pattern: "release/**/*.exe"

          - name: Linux
            os: ubuntu-latest
            script: package:linux
            pattern: |
              release/**/*.AppImage
              release/**/*.deb

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build & package
        run: npm run ${{ matrix.script }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: vistracer-${{ matrix.name }}
          path: ${{ matrix.pattern }}
          if-no-files-found: warn
